<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEU Grievance Support</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --text: #e5e7eb;
      --line: #243042;
      --blue: #2563eb;
      --blue-soft: #1e3a8a;
      --green: #15803d;
      --green-soft: #052e1a;
      --red: #b91c1c;
      --status-bg: #0f1b33;
      --status-line: #29406b;
      --status-text: #dbeafe;
    }* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at top, #0f1b33 0%, #0b1220 38%, #08101c 100%);
  color: var(--text);
  line-height: 1.5;
}
.wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 14px;
}
.card {
  background: rgba(17, 24, 39, 0.97);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
}
h1, h2 { margin: 0 0 10px; }
h1 {
  font-size: clamp(18px, 4.3vw, 24px);
  line-height: 1.2;
  letter-spacing: 0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}
h2 { font-size: 20px; }
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
label {
  display: block;
  font-weight: 700;
  margin-bottom: 6px;
  font-size: 15px;
}
input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 13px 14px;
  font-size: 15px;
  color: #f8fafc;
  background: #0f172a;
  outline: none;
  -webkit-text-fill-color: #f8fafc;
  caret-color: #f8fafc;
  appearance: none;
  opacity: 1;
}
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
  -webkit-text-fill-color: #f8fafc !important;
  caret-color: #f8fafc;
  -webkit-box-shadow: 0 0 0 1000px #0f172a inset !important;
  box-shadow: 0 0 0 1000px #0f172a inset !important;
  transition: background-color 9999s ease-in-out 0s;
  border: 1px solid var(--line);
}
input::placeholder { color: #7b8aa6; }
input:focus {
  border-color: #60a5fa;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
}
.btns {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 12px;
}
.btns.single {
  grid-template-columns: 1fr;
  margin-top: 0;
  margin-bottom: 14px;
}
button {
  appearance: none;
  border: 0;
  border-radius: 14px;
  padding: 13px 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  min-height: 50px;
  text-align: center;
}
.download-btn { background: var(--red); color: #fff; }
.lookup-btn { background: var(--green); color: #fff; }
.support-btn { background: var(--blue-soft); color: #fff; }
.grievance-btn { background: var(--blue); color: #fff; }
.status {
  border-radius: 14px;
  padding: 12px 13px;
  font-size: 14px;
  margin-top: 12px;
  background: var(--status-bg);
  border: 1px solid var(--status-line);
  color: var(--status-text);
}
.ok {
  background: var(--green-soft);
  border-color: #166534;
  color: #bbf7d0;
}
.hidden { display: none; }
@media (max-width: 760px) {
  .grid, .btns { grid-template-columns: 1fr; }
}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>BEU Grievance Support</h1>
    </div><div class="card">
  <div class="btns single">
    <button class="download-btn" id="downloadBtn">Download PDF</button>
  </div>

  <h2>Student details</h2>
  <div class="grid">
    <div>
      <label for="regNo">Registration number</label>
      <input id="regNo" type="text" placeholder="Example: XXXXXXXX010" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    </div>
    <div>
      <label for="studentName">Student name</label>
      <input id="studentName" type="text" placeholder="Auto-filled or type manually" autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false" />
    </div>
    <div>
      <label for="college">College</label>
      <input id="college" type="text" placeholder="Auto-filled or type manually" autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false" />
    </div>
    <div>
      <label for="contactEmail">Email for communication</label>
      <input id="contactEmail" type="email" placeholder="example@mail.com" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    </div>
  </div>

  <div class="btns">
    <button class="lookup-btn" id="lookupBtn">Get name</button>
    <button class="support-btn" id="supportMailBtn">Send support mail</button>
    <button class="grievance-btn" id="grievanceMailBtn">Send grievance mail</button>
  </div>

  <div class="status" id="lookupStatus">If name is not found, type manually.</div>
  <div class="status" id="downloadStatus">Download the PDF first, then attach it manually in the mail app.</div>
</div>

  </div>  <script>
    const TO = [
      'beubihar@gmail.com',
      'registrar.beu@bihar.gov.in',
      'coe.beu@bihar.gov.in'
    ];

    const CC = [
      'complaint@aicte-india.org',
      'helpdesk1@aicte-india.org',
      'prsec_sctech@bihar.gov.in',
      'ps.dst.bihar@gmail.com',
      'secy-edn-bih@nic.in',
      'splsecretary.edn@gmail.com',
      'ssabihar@gmail.com',
      'info-Lokshikayat-bih@gov.in',
      'us.petitions@rb.nic.in',
      'secy.president@rb.nic.in',
      'nhrcga@nic.in',
      'bhrc-bih@nic.in',
      'ugc.technical@nic.in',
      'contact.ugc@nic.in'
    ];

    const SUPPORT_SUBJECT = 'Support for complaint raised by Nitesh Kumar regarding BEU result irregularities';
    const GRIEVANCE_SUBJECT_MATCH = 'Individual grievance regarding confirmed old backlog penalty in BEU result';
    const GRIEVANCE_SUBJECT_GENERIC = 'Grievance on behalf of 1330+ students regarding BEU result irregularities';

    const PDF_PATH = '/files/Representation_Annexures_and_Evidence_BEU_Result_13-03-2026.pdf';
    const PENALTY_TXT_PATH = '/data/penalty_calc_output.txt';

    const LOOKUP_VARIANTS = [
      { year: '2025', semester: 'II', exam_held: 'November/2025' },
      { year: '2025', semester: 'IV', exam_held: 'December/2025' },
      { year: '2025', semester: 'VI', exam_held: 'November/2025' },
      { year: '2025', semester: 'VIII', exam_held: 'May/2025' },
      { year: '2024', semester: 'I', exam_held: 'May/2025' },
      { year: '2024', semester: 'III', exam_held: 'July/2025' }
    ];

    let penaltyRows = null;

    const regNoEl = document.getElementById('regNo');
    const studentNameEl = document.getElementById('studentName');
    const collegeEl = document.getElementById('college');
    const contactEmailEl = document.getElementById('contactEmail');
    const lookupStatusEl = document.getElementById('lookupStatus');
    const downloadStatusEl = document.getElementById('downloadStatus');

    function buildLookupUrl(regNo, variant) {
      return `https://beu-bih.ac.in/backend/v1/result/get-result?year=${encodeURIComponent(variant.year)}&redg_no=${encodeURIComponent(regNo)}&semester=${encodeURIComponent(variant.semester)}&exam_held=${encodeURIComponent(variant.exam_held)}`;
    }

    async function loadPenaltyRows() {
      if (penaltyRows) return penaltyRows;
      const res = await fetch(PENALTY_TXT_PATH);
      if (!res.ok) throw new Error(`Penalty file HTTP ${res.status}`);
      const text = await res.text();
      const lines = text.split(/
?
/).map(line => line.trim()).filter(Boolean);
      if (lines.length < 2) {
        penaltyRows = [];
        return penaltyRows;
      }
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const parts = lines[i].split('|').map(s => s.trim());
        if (parts.length < 14) continue;
        rows.push({
          reg_no: parts[0],
          branch_code: parts[1],
          penalized_subject_codes: parts[2],
          subject_names: parts[3],
          old_shown_grades: parts[4],
          new_shown_grades: parts[5],
          should_be_grades: parts[6],
          shown_sgpa: parts[7],
          corrected_sgpa: parts[8],
          shown_cgpa: parts[9],
          corrected_cgpa: parts[10],
          status: parts[11],
          old_result_url: parts[12],
          new_result_url: parts[13]
        });
      }
      penaltyRows = rows;
      return rows;
    }

    async function findPenaltyMatch(regNo) {
      const rows = await loadPenaltyRows();
      return rows.find(row => row.reg_no === regNo) || null;
    }

    function makeSupportBody() {
      const studentName = (studentNameEl.value || '________________').trim();
      const regNo = (regNoEl.value || '________________').trim();
      const college = (collegeEl.value || '').trim();
      const contactEmail = (contactEmailEl.value || '________________').trim();

      const header = college
        ? `I, ${studentName}, Registration No. ${regNo}, ${college}, write in support of the complaint and irregularities raised by Nitesh Kumar regarding the BEU result matter.`
        : `I, ${studentName}, Registration No. ${regNo}, write in support of the complaint and irregularities raised by Nitesh Kumar regarding the BEU result matter.`;

      const sign = college
        ? `${studentName}
Registration No.: ${regNo}
${college}
Email for communication: ${contactEmail}`
        : `${studentName}
Registration No.: ${regNo}
Email for communication: ${contactEmail}`;

      return `Respected Sir/Madam,

SUBJECT MATTER: support for the complaint raised by Nitesh Kumar regarding apparent irregularities in B.Tech. 2nd Semester Examination, 2025 (Old) result published on 13.03.2026 and the need for review of B.Tech. 4th Semester Examination, 2025 result published on 20.03.2026.

${header}

I state that the complaint and irregularities pointed out by Nitesh Kumar appear serious and deserve immediate examination by the competent authority. The questions raised in the representation require a proper written reply and clarification from the University and the concerned authorities.

I therefore request that the matter be examined carefully and that a formal response be issued on the complaint at the earliest.

The supporting representation and documentary evidence are attached with this email.

Yours faithfully,
${sign}`;
    }

    function makeOwnAffectedGrievanceBody(match) {
      const studentName = (studentNameEl.value || '________________').trim();
      const regNo = (regNoEl.value || '________________').trim();
      const college = (collegeEl.value || '').trim();
      const contactEmail = (contactEmailEl.value || '________________').trim();
      const sign = college
        ? `${studentName}
Registration No.: ${regNo}
${college}
Email for communication: ${contactEmail}`
        : `${studentName}
Registration No.: ${regNo}
Email for communication: ${contactEmail}`;
      const collegeText = college ? `, student of ${college},` : ',';

      return `Respected Sir/Madam,

SUBJECT MATTER: my own grievance regarding apparent continued use of the old backlog penalty in my result and the need for correction under the revised framework.

I, ${studentName}, Registration No. ${regNo}${collegeText} am submitting this grievance regarding my own result, as my registration number appears in the discrepancy list prepared from the published records.

As per the compiled discrepancy data, my case reflects PENALTY_CONFIRMED in the following subject(s): ${match.subject_names}. The published grades shown are ${match.new_shown_grades}, whereas the grades that should have been awarded are ${match.should_be_grades}. My shown SGPA/CGPA are ${match.shown_sgpa}/${match.shown_cgpa}, whereas the corrected SGPA/CGPA are ${match.corrected_sgpa}/${match.corrected_cgpa}.

This appears consistent with continued application of the earlier backlog grade penalty despite Registrar Letter No. 232 dated 12.03.2026, Memo No. 438/2026/Patna, and the revised UG Regulation provisions including Clause 5.7. Under the old rule, a backlog paper grade was reduced by one step. Under the revised framework, that one-step-lower penalty no longer continues.

I therefore request immediate examination of my own grievance, correction of the result-processing logic wherever required, correction and republication of my affected result, and issuance of a written reply at the earliest.

The representation, annexures, and documentary evidence are attached with this email for reference.

Yours faithfully,
${sign}`;
    }

    function makeGenericGrievanceBody() {
      const studentName = (studentNameEl.value || '________________').trim();
      const regNo = (regNoEl.value || '________________').trim();
      const college = (collegeEl.value || '').trim();
      const contactEmail = (contactEmailEl.value || '________________').trim();
      const intro = college
        ? `I, ${studentName}, Registration No. ${regNo}, ${college}, am forwarding this grievance in relation to the BEU result irregularity matter on behalf of 1330+ students.`
        : `I, ${studentName}, Registration No. ${regNo}, am forwarding this grievance in relation to the BEU result irregularity matter on behalf of 1330+ students.`;
      const sign = college
        ? `${studentName}
Registration No.: ${regNo}
${college}
Email for communication: ${contactEmail}`
        : `${studentName}
Registration No.: ${regNo}
Email for communication: ${contactEmail}`;

      return `Respected Sir/Madam,

SUBJECT MATTER: grievance on behalf of 1330+ students regarding apparent continued use of the old backlog penalty in B.Tech. 2nd Semester Examination, 2025 (Old) result published on 13.03.2026 and the need for immediate review of B.Tech. 4th Semester Examination, 2025 result published on 20.03.2026.

${intro}

The grievance concerns the apparent continued application of the earlier backlog grade penalty despite Registrar Letter No. 232 dated 12.03.2026, Memo No. 438/2026/Patna, and the revised UG Regulation provisions including Clause 5.7. Under the old rule, a backlog paper grade was reduced by one step. Under the revised framework, that one-step-lower penalty no longer continues.

The attached PDF contains the representation, annexures, and documentary evidence placed on record in support of this grievance.

I request immediate examination of the matter, correction of the result-processing logic wherever required, republication of the affected results, and issuance of a written reply on the grievance at the earliest.

Yours faithfully,
${sign}`;
    }

    async function lookupStudent() {
      const regNo = regNoEl.value.trim();
      if (!regNo) {
        lookupStatusEl.classList.remove('hidden');
        lookupStatusEl.textContent = 'Enter registration number first.';
        lookupStatusEl.className = 'status';
        return;
      }

      lookupStatusEl.classList.remove('hidden');
      lookupStatusEl.textContent = 'Checking registration number...';
      lookupStatusEl.className = 'status';

      for (const variant of LOOKUP_VARIANTS) {
        try {
          const res = await fetch(buildLookupUrl(regNo, variant));
          if (!res.ok) continue;
          const payload = await res.json();
          const data = payload && payload.data ? payload.data : null;
          const name = data && data.name ? data.name : '';
          const college = data && data.college_name ? data.college_name : '';
          if (name) {
            studentNameEl.value = name;
            collegeEl.value = college || '';
            lookupStatusEl.classList.add('hidden');
            return;
          }
        } catch (err) {
          // continue fallback chain
        }
      }

      collegeEl.value = '';
      lookupStatusEl.classList.remove('hidden');
      lookupStatusEl.textContent = 'Name not found. Type manually.';
      lookupStatusEl.className = 'status';
    }

    async function downloadPdf() {
      downloadStatusEl.textContent = 'Starting download...';
      downloadStatusEl.className = 'status';
      try {
        const response = await fetch(PDF_PATH);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Representation_Annexures_and_Evidence_BEU_Result_13-03-2026.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        downloadStatusEl.textContent = 'Download started. Attach the PDF manually in the mail app.';
        downloadStatusEl.className = 'status ok';
      } catch (err) {
        downloadStatusEl.textContent = 'Download failed. Check the PDF file path and try again.';
        downloadStatusEl.className = 'status';
      }
    }

    function openMail(subject, body) {
      const mailto = `mailto:${encodeURIComponent(TO.join(','))}?cc=${encodeURIComponent(CC.join(','))}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
    }

    document.getElementById('lookupBtn').addEventListener('click', lookupStudent);
    document.getElementById('downloadBtn').addEventListener('click', downloadPdf);
    document.getElementById('supportMailBtn').addEventListener('click', () => openMail(SUPPORT_SUBJECT, makeSupportBody()));
    document.getElementById('grievanceMailBtn').addEventListener('click', async () => {
      const regNo = regNoEl.value.trim();
      try {
        const match = regNo ? await findPenaltyMatch(regNo) : null;
        if (match) {
          openMail(GRIEVANCE_SUBJECT_MATCH, makeOwnAffectedGrievanceBody(match));
        } else {
          openMail(GRIEVANCE_SUBJECT_GENERIC, makeGenericGrievanceBody());
        }
      } catch (err) {
        openMail(GRIEVANCE_SUBJECT_GENERIC, makeGenericGrievanceBody());
      }
    });
  </script></body>
</html>
